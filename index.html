<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patrimoine · Cockpit immobilier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400..800&display=swap" rel="stylesheet">
<script src="chart.umd.min.js"></script>
<style>
:root{
  --bg:#f6f2e8; --card:#fffdf7; --line:#e8e0cd; --line2:#f0ead9;
  --txt:#20302a; --muted:#6d6a5c; --faint:#a09a87;
  --teal:#1d4d3b; --teal-soft:#e6ede4; --teal-dark:#143627;
  --blue:#2f5d8a; --blue-soft:#e6edf4;
  --violet:#8a5a83; --violet-soft:#f0e7ee;
  --amber:#8a6420; --amber-soft:#f6edd8;
  --red:#a33d2d; --red-soft:#f6e4e0;
  --green:#3f6f50; --green-soft:#e7efe6;
  --gold:#b08d3f; --gold-soft:#f3ead3;
  --side:#15352a; --side2:#0f2a20;
  --shadow:0 1px 2px rgba(74,60,24,.06), 0 2px 6px rgba(74,60,24,.05);
  --shadow-lg:0 16px 44px rgba(40,32,10,.18);
  --r:16px;
  --serif:'Fraunces',Georgia,serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg)}
body{font-family:'Inter',-apple-system,system-ui,sans-serif;color:var(--txt);font-size:14px;-webkit-font-smoothing:antialiased}
.num{font-variant-numeric:tabular-nums;letter-spacing:-.01em}
h1,h2,h3,h4{margin:0;font-family:var(--serif);letter-spacing:-.01em}
a{color:var(--teal)}
button{font-family:inherit}
::selection{background:var(--gold-soft)}

/* ===== Layout ===== */
.app{display:flex;min-height:100vh}
.sidebar{width:248px;background:linear-gradient(180deg,var(--side),var(--side2));position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;z-index:40}
.main{flex:1;margin-left:248px;padding:34px 40px 70px;max-width:1250px}
.logo{display:flex;align-items:center;gap:12px;padding:26px 22px 18px}
.logo-ic{width:40px;height:40px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:22px;font-weight:600;color:var(--side2)}
.logo b{font-family:var(--serif);font-size:18px;font-weight:600;display:block;line-height:1.1;color:#f3edd9;letter-spacing:.01em}
.logo span{font-size:11px;color:#b8a878;letter-spacing:.04em}
.nav{padding:10px 14px;flex:1;overflow-y:auto}
.nav-sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.16em;color:#9a8c5f;padding:18px 10px 7px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:13.5px;font-weight:500;color:#cfc9b4;cursor:pointer;transition:all .15s;border-left:3px solid transparent;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:rgba(255,255,255,.08);border-left-color:var(--gold);color:#fff;font-weight:600}
.nav-item .badge{margin-left:auto}
.sidebar-foot{padding:14px;border-top:1px solid rgba(255,255,255,.08)}
.sidebar-foot .btn{background:transparent;border-color:rgba(255,255,255,.22);color:#e9e2cb}
.sidebar-foot .btn:hover{border-color:var(--gold);color:#fff;box-shadow:none}
.sync-pill{display:flex;align-items:center;gap:8px;font-size:11.5px;color:#b8b19a;padding:9px 11px;border-radius:9px;background:rgba(0,0,0,.22);cursor:pointer}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#8b856f;flex-shrink:0}
.sync-dot.ok{background:#7dc98f}.sync-dot.warn{background:#e0b25a}.sync-dot.err{background:#e07a68}

.topbar{display:none}
@media(max-width:920px){
  .sidebar{display:none}
  .main{margin-left:0;padding:16px 14px 60px}
  .topbar{display:flex;position:sticky;top:0;z-index:40;background:var(--side);padding:10px 14px;gap:8px;align-items:center;overflow-x:auto}
  .topbar .nav-item{white-space:nowrap;padding:8px 12px;border-left:none}
  .topbar .nav-item.active{box-shadow:inset 0 -2px 0 var(--gold)}
}

/* ===== Cards / KPI ===== */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.card-p{padding:24px}
.grid{display:grid;gap:18px}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.g4,.g3,.g2{grid-template-columns:1fr}}
.kpi-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--faint);display:flex;align-items:center;gap:5px}
.kpi-value{font-family:var(--serif);font-size:31px;font-weight:600;letter-spacing:-.01em;margin-top:8px;font-variant-numeric:lining-nums}
.kpi-sub{font-size:12px;color:var(--muted);margin-top:7px;line-height:1.55}
.sec-title{font-family:var(--serif);font-size:17.5px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:16px;letter-spacing:-.01em}
.sec-title small{font-family:'Inter';font-weight:500;color:var(--muted);font-size:12px;letter-spacing:0}

/* ===== Badges ===== */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;padding:3.5px 10px;border-radius:999px;letter-spacing:.02em}
.b-teal{background:var(--teal-soft);color:var(--teal)}
.b-blue{background:var(--blue-soft);color:var(--blue)}
.b-violet{background:var(--violet-soft);color:var(--violet)}
.b-amber{background:var(--amber-soft);color:var(--amber)}
.b-red{background:var(--red-soft);color:var(--red)}
.b-green{background:var(--green-soft);color:var(--green)}
.b-grey{background:var(--line2);color:var(--muted)}

/* ===== Boutons ===== */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--txt);transition:all .16s}
.btn:hover{border-color:var(--gold);box-shadow:0 2px 8px rgba(120,95,30,.12);transform:translateY(-1px)}
.btn:active{transform:scale(.98)}
.btn-p{background:var(--teal);border-color:var(--teal);color:#f6f1de}
.btn-p:hover{background:var(--teal-dark);border-color:var(--teal-dark)}
.btn-danger{color:var(--red);border-color:#e3beb4}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:8px}
.btn-icon{padding:5px 8px;font-size:12px;border-radius:8px}

/* ===== Onglets éditoriaux ===== */
.tabs{display:flex;gap:22px;background:transparent;padding:0 2px;border-radius:0;border-bottom:1.5px solid var(--line);width:100%;max-width:100%;overflow-x:auto;margin-bottom:22px}
.tab{padding:10px 1px 12px;border-radius:0;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;border-bottom:2.5px solid transparent;margin-bottom:-1.5px}
.tab:hover{color:var(--txt)}
.tab.active{background:transparent;color:var(--teal);box-shadow:none;border-bottom-color:var(--gold);font-weight:700}

/* ===== Formulaires ===== */
input,select,textarea{background:#fffef9;border:1px solid #d8cfb6;color:var(--txt);border-radius:9px;padding:7.5px 11px;font-size:13px;outline:none;font-family:inherit;transition:all .15s}
input:focus,select:focus,textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(29,77,59,.13)}
input[type=number]{font-variant-numeric:tabular-nums}
input[readonly]{background:var(--line2);color:var(--muted)}
label.fl{font-size:10.5px;font-weight:700;color:var(--faint);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.1em}

/* ===== Tables ===== */
table.tbl{width:100%;font-size:12.5px;border-collapse:collapse}
table.tbl th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--faint);text-align:left;padding:10px 9px;border-bottom:1.5px solid var(--line);background:transparent;position:sticky;top:0}
table.tbl td{padding:8px 9px;border-bottom:1px solid var(--line2);vertical-align:middle}
table.tbl tr:hover td{background:#faf6ea}
table.tbl input,table.tbl select{padding:4px 8px;font-size:12px;width:100%}
table.tbl tfoot td{font-weight:700;background:#f8f3e4;border-top:2px solid var(--line)}
.tr-right{text-align:right}
.scroll-wrap{overflow-x:auto;border-radius:var(--r)}

/* ===== Progression ===== */
.pbar{height:7px;background:var(--line2);border-radius:4px;overflow:hidden}
.pfill{height:100%;background:var(--teal);border-radius:4px;transition:width .5s cubic-bezier(.2,.8,.3,1)}
.pfill.blue{background:var(--blue)}.pfill.violet{background:var(--violet)}.pfill.amber{background:#c08a2d}.pfill.red{background:#b0483a}

/* ===== Tooltip ===== */
.tt{position:relative;display:inline-flex;cursor:help}
.tt-i{width:14px;height:14px;border-radius:50%;background:var(--gold-soft);color:var(--amber);font-size:9px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
.tt-c{visibility:hidden;opacity:0;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--side2);color:#efe9d5;padding:10px 13px;border-radius:10px;font-size:11.5px;font-weight:400;line-height:1.55;width:255px;z-index:60;transition:opacity .15s;pointer-events:none;box-shadow:var(--shadow-lg);text-transform:none;letter-spacing:0}
.tt:hover .tt-c{visibility:visible;opacity:1}

/* ===== Modales / toast ===== */
.modal-ov{position:fixed;inset:0;background:rgba(24,32,22,.55);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.modal-ov.show{display:flex}
.modal-box{background:var(--card);border:1px solid var(--line);border-radius:18px;max-width:580px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);padding:26px}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(96px);background:var(--side2);color:#f0ead6;font-weight:500;font-size:13px;padding:12px 22px;border-radius:12px;z-index:1000;transition:transform .32s cubic-bezier(.2,.8,.3,1);box-shadow:var(--shadow-lg);border:1px solid rgba(176,141,63,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{background:#5c221a;border-color:rgba(224,122,104,.5)}

/* ===== Divers ===== */
.hero-banner{border-radius:var(--r);padding:15px 19px;display:flex;align-items:center;gap:12px;font-size:13px;font-weight:500}
.hb-amber{background:var(--gold-soft);border:1px solid #e2d2a4;color:#6e5216}
.hb-teal{background:var(--teal-soft);border:1px solid #c4d4c2;color:var(--teal)}
.chart-box{position:relative;width:100%}
.heat{display:grid;grid-template-columns:repeat(12,1fr);gap:6px}
.heat-cell{aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;cursor:pointer;color:#fff;transition:transform .12s}
.heat-cell:hover{transform:scale(1.12)}
.doc-item{display:flex;align-items:center;gap:10px;padding:10px 13px;background:#faf6ea;border:1px solid var(--line2);border-radius:10px;font-size:12.5px;margin-bottom:6px;transition:border-color .15s}
.doc-item:hover{border-color:var(--gold)}
details.acc{border:1px solid var(--line);border-radius:var(--r);background:var(--card);padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow)}
details.acc summary{cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px;font-family:var(--serif);font-weight:600;font-size:14.5px}
details.acc summary::-webkit-details-marker{display:none}
details.acc .arr{transition:transform .2s;color:var(--faint);font-size:11px}
details.acc[open] .arr{transform:rotate(90deg)}
.empty{text-align:center;padding:36px 20px;color:var(--muted);font-size:13px}
.empty .big{font-size:36px;margin-bottom:8px}
.page{display:none}.page.active{display:block;animation:pageIn .3s ease}
@keyframes pageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.mt{margin-top:18px}.mb{margin-bottom:18px}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.spread{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.agenda-item{display:flex;align-items:center;gap:14px;padding:12px 16px;border:1px solid var(--line2);border-radius:12px;margin-bottom:9px;background:var(--card);transition:border-color .15s}
.agenda-item:hover{border-color:var(--gold)}
.agenda-date{width:54px;text-align:center;flex-shrink:0;border-right:1px solid var(--line2);padding-right:12px}
.agenda-date .d{font-family:var(--serif);font-size:21px;font-weight:600;line-height:1}
.agenda-date .m{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin-top:2px}
.legend-dot{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:6px;vertical-align:-1px}
</style>
</head>
<body>

<div class="topbar" id="topbar"></div>

<div class="app">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-ic">P</div>
      <div><b>Patrimoine</b><span id="logoSub">Armand &amp; Victoria</span></div>
    </div>
    <nav class="nav" id="sideNav"></nav>
    <div class="sidebar-foot">
      <div class="row" style="margin-bottom:8px">
        <button class="btn btn-sm" style="flex:1" onclick="openQuickAdd()">＋ Ajouter</button>
      </div>
      <div class="sync-pill" onclick="navTo('reglages')" id="syncPill">
        <span class="sync-dot" id="syncDot"></span>
        <span id="syncLabel">Sauvegarde locale</span>
      </div>
    </div>
  </aside>

  <main class="main">
    <div id="pages"></div>
  </main>
</div>

<div id="toast" class="toast"></div>

<div id="modalConfirm" class="modal-ov">
  <div class="modal-box">
    <h3 style="font-size:16px;margin-bottom:8px" id="mcTitle"></h3>
    <div style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:18px" id="mcBody"></div>
    <div class="row" style="justify-content:flex-end">
      <button class="btn" id="mcCancel">Annuler</button>
      <button class="btn btn-p" id="mcOk">Confirmer</button>
    </div>
  </div>
</div>

<div id="modalGeneric" class="modal-ov"><div class="modal-box" id="modalGenericBox"></div></div>

</body>
<script>
// =====================================================================
// PATRIMOINE v2 — cockpit immobilier Armand & Victoria
// Données : localStorage (cache) + fichier data.json via GitHub (sync)
// Documents : IndexedDB (local)
// =====================================================================
'use strict';

const APP = {
  LS_KEY: 'patrimoine_v2',
  LS_TOKEN: 'patrimoine_gh_token',
  DB_NAME: 'patrimoine_docs',
  DB_STORE: 'documents',
  state: null,
  db: null,
  ghSha: null,        // sha du data.json distant (pour update)
  charts: {},         // instances Chart.js
  dirty: false,
  autoSyncTimer: null,
};

// ---------- Format ----------
const fmtEUR = (n, dec=0) => (n===null||n===undefined||isNaN(n)) ? '—' :
  n.toLocaleString('fr-FR',{minimumFractionDigits:dec,maximumFractionDigits:dec}) + ' €';
const fmtPct = (n, dec=1) => (n===null||n===undefined||isNaN(n)) ? '—' :
  n.toLocaleString('fr-FR',{minimumFractionDigits:dec,maximumFractionDigits:dec}) + ' %';
const fmtDate = d => d ? new Date(d).toLocaleDateString('fr-FR') : '—';
const MONTHS_FR = ['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
const monthLabel = ym => { if(!ym) return '—'; const [y,m]=ym.split('-'); return MONTHS_FR[+m-1]+' '+y; };
const currentYM = () => { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); };
const ymToDate = ym => { const [y,m]=ym.split('-').map(Number); return new Date(y,m-1,1); };
const dateToYM = d => { const x=new Date(d); return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0'); };
const addMonths = (ym,n) => { const d=ymToDate(ym); d.setMonth(d.getMonth()+n); return dateToYM(d); };
const monthsBetween = (ymA, ymB) => { const a=ymToDate(ymA), b=ymToDate(ymB); return (b.getFullYear()-a.getFullYear())*12 + (b.getMonth()-a.getMonth()); };
const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const uid = p => (p||'id') + '_' + Date.now() + '_' + Math.floor(Math.random()*1e4);

// ---------- Toast / modals ----------
function toast(msg, type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+(type==='error'?'error ':'')+'show';
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),2600);
}
function confirmModal({title, body, okLabel='Confirmer'}){
  return new Promise(res=>{
    document.getElementById('mcTitle').textContent=title;
    document.getElementById('mcBody').innerHTML=body;
    document.getElementById('mcOk').textContent=okLabel;
    const m=document.getElementById('modalConfirm'); m.classList.add('show');
    const done=r=>{ m.classList.remove('show'); res(r); };
    document.getElementById('mcOk').onclick=()=>done(true);
    document.getElementById('mcCancel').onclick=()=>done(false);
  });
}
function genericModal(html){
  const m=document.getElementById('modalGeneric');
  document.getElementById('modalGenericBox').innerHTML=html;
  m.classList.add('show');
}
function closeModal(){ document.getElementById('modalGeneric').classList.remove('show'); }
document.addEventListener('click', e=>{ if(e.target.classList?.contains('modal-ov')) e.target.classList.remove('show'); });

// =====================================================================
// IndexedDB — documents
// =====================================================================
function openDB(){
  return new Promise((res,rej)=>{
    const rq=indexedDB.open(APP.DB_NAME,1);
    rq.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains(APP.DB_STORE)){
        const st=db.createObjectStore(APP.DB_STORE,{keyPath:'id',autoIncrement:true});
        st.createIndex('bienId','bienId',{unique:false});
      }
    };
    rq.onsuccess=e=>{APP.db=e.target.result;res(APP.db);};
    rq.onerror=rej;
  });
}
const dbTx = mode => APP.db.transaction(APP.DB_STORE,mode).objectStore(APP.DB_STORE);
const dbAddDoc = doc => new Promise((res,rej)=>{const r=dbTx('readwrite').add(doc);r.onsuccess=()=>res(r.result);r.onerror=rej;});
const dbGetAllDocs = () => new Promise((res,rej)=>{const r=dbTx('readonly').getAll();r.onsuccess=()=>res(r.result);r.onerror=rej;});
const dbGetDoc = id => new Promise((res,rej)=>{const r=dbTx('readonly').get(id);r.onsuccess=()=>res(r.result);r.onerror=rej;});
const dbDelDoc = id => new Promise((res,rej)=>{const r=dbTx('readwrite').delete(id);r.onsuccess=()=>res();r.onerror=rej;});
const dbPutDoc = doc => new Promise((res,rej)=>{const r=dbTx('readwrite').put(doc);r.onsuccess=()=>res();r.onerror=rej;});

// =====================================================================
// State — défaut (vide : les données arrivent via data.json / import)
// =====================================================================
function defaultState(){
  return {
    version: 2,
    updatedAt: new Date().toISOString(),
    couple: {
      p1: { id:'armand', nom:'Personne 1', couleur:'#2f5d8a' },
      p2: { id:'victoria', nom:'Personne 2', couleur:'#8a5a83' }
    },
    biens: [],
    agenda: [],
    coffreCats: {},
    sync: { repo:'', branch:'main', path:'data.json', auto:false },
    ui: { page:'dashboard', period: currentYM() }
  };
}

function saveLocal(){
  APP.state.updatedAt = new Date().toISOString();
  try{ localStorage.setItem(APP.LS_KEY, JSON.stringify(APP.state)); }
  catch(e){ toast('Erreur sauvegarde locale','error'); }
  markDirty();
}
function markDirty(){
  APP.dirty = true;
  refreshSyncPill();
  if(APP.state.sync?.auto && APP._syncedOnce && ghToken() && APP.state.sync.repo){
    clearTimeout(APP.autoSyncTimer);
    APP.autoSyncTimer = setTimeout(()=>ghPush(true), 4000);
  }
}
function loadLocal(){
  try{
    const raw=localStorage.getItem(APP.LS_KEY);
    if(raw){ APP.state=migrate(JSON.parse(raw)); return true; }
  }catch(e){ console.error(e); }
  APP.state=defaultState();
  return false;
}
function migrate(s){
  if(!s.ui) s.ui={page:'dashboard',period:currentYM()};
  if(!s.sync) s.sync={repo:'',branch:'main',path:'data.json',auto:false};
  if(!s.agenda) s.agenda=[];
  if(!s.coffreCats) s.coffreCats={};
  if(!Array.isArray(s.biens)) s.biens=[];
  return s;
}
const bienById = id => APP.state.biens.find(b=>b.id===id);
const P1 = () => APP.state.couple.p1;
const P2 = () => APP.state.couple.p2;

// =====================================================================
// GitHub sync — data.json dans un repo privé
// Token : stocké UNIQUEMENT en localStorage (jamais dans data.json)
// =====================================================================
const ghToken = () => localStorage.getItem(APP.LS_TOKEN) || '';
const setGhToken = t => t ? localStorage.setItem(APP.LS_TOKEN,t) : localStorage.removeItem(APP.LS_TOKEN);
const ghConfigured = () => !!(ghToken() && APP.state?.sync?.repo);
const ghUrl = () => `https://api.github.com/repos/${APP.state.sync.repo}/contents/${APP.state.sync.path||'data.json'}`;
const ghHeaders = () => ({ 'Authorization':'Bearer '+ghToken(), 'Accept':'application/vnd.github+json', 'X-GitHub-Api-Version':'2022-11-28' });
const b64encode = s => { const b=new TextEncoder().encode(s); let bin=''; for(let i=0;i<b.length;i+=0x8000) bin+=String.fromCharCode.apply(null,b.subarray(i,i+0x8000)); return btoa(bin); };
const b64decode = s => new TextDecoder().decode(Uint8Array.from(atob(s.replace(/\n/g,'')), c=>c.charCodeAt(0)));

async function ghPull(silent=false){
  if(!ghConfigured()){ if(!silent) toast('Configure GitHub dans Réglages','error'); return null; }
  try{
    const r = await fetch(ghUrl()+'?ref='+(APP.state.sync.branch||'main'), {headers: ghHeaders()});
    if(r.status===404){ if(!silent) toast('data.json introuvable dans le repo — fais un premier Push','error'); return null; }
    if(!r.ok) throw new Error('GitHub '+r.status);
    const j = await r.json();
    APP.ghSha = j.sha; APP._syncedOnce = true;
    const remote = migrate(JSON.parse(b64decode(j.content)));
    return remote;
  }catch(e){
    console.error(e);
    if(!silent) toast('Erreur GitHub : '+e.message,'error');
    return null;
  }
}
async function ghPush(silent=false){
  if(!ghConfigured()){ if(!silent) toast('Configure GitHub dans Réglages','error'); return false; }
  try{
    if(!APP.ghSha){
      const r0 = await fetch(ghUrl()+'?ref='+(APP.state.sync.branch||'main'), {headers: ghHeaders()});
      if(r0.ok){ APP.ghSha=(await r0.json()).sha; }
    }
    const body = {
      message: 'Patrimoine · sauvegarde du '+new Date().toLocaleString('fr-FR'),
      content: b64encode(JSON.stringify(APP.state,null,1)),
      branch: APP.state.sync.branch||'main'
    };
    if(APP.ghSha) body.sha = APP.ghSha;
    const r = await fetch(ghUrl(), {method:'PUT',headers:{...ghHeaders(),'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok){ const t=await r.text(); throw new Error(r.status+' '+t.slice(0,120)); }
    const j = await r.json();
    APP.ghSha = j.content.sha; APP._syncedOnce = true;
    APP.dirty = false;
    refreshSyncPill();
    if(!silent) toast('Sauvegardé sur GitHub ✓');
    return true;
  }catch(e){
    console.error(e);
    if(!silent) toast('Erreur push GitHub : '+e.message,'error');
    refreshSyncPill('err');
    return false;
  }
}
async function ghSyncOnLoad(){
  if(!ghConfigured()) return;
  refreshSyncPill('sync');
  const remote = await ghPull(true);
  if(remote){
    const remoteT = new Date(remote.updatedAt||0).getTime();
    const localT = new Date(APP.state.updatedAt||0).getTime();
    if(remoteT > localT){
      const keepSync=APP.state.sync; APP.state = remote; if(keepSync&&keepSync.repo) APP.state.sync=keepSync;
      localStorage.setItem(APP.LS_KEY, JSON.stringify(APP.state));
      toast('Données GitHub chargées (plus récentes) ✓');
      renderAll();
    }else if(localT > remoteT){
      toast('Données locales plus récentes — pense à Push (Réglages)');
    }
    APP.dirty = localT > remoteT;
  }
  refreshSyncPill();
}
function refreshSyncPill(force){
  const dot=document.getElementById('syncDot'), lab=document.getElementById('syncLabel');
  if(!dot) return;
  if(force==='err'){ dot.className='sync-dot err'; lab.textContent='Erreur de sync'; return; }
  if(force==='sync'){ dot.className='sync-dot warn'; lab.textContent='Synchronisation…'; return; }
  if(!ghConfigured()){ dot.className='sync-dot'; lab.textContent='Local uniquement'; return; }
  if(APP.dirty){ dot.className='sync-dot warn'; lab.textContent='Modifs non pushées'; }
  else{ dot.className='sync-dot ok'; lab.textContent='Sync GitHub ✓'; }
}

/**
 * Échéancier d'un prêt : réel (banque) si pret.tableauReel, sinon simulé.
 * Retourne [{n, amort, int, ass, ech, crd}] — n=1 correspond au mois de dateDebutAmortissement.
 */
function pretSchedule(pret){
  if(pret._schedCache) return pret._schedCache;
  let rows;
  if(pret.tableauReel && pret.tableauReel.length){
    rows = pret.tableauReel.map(r=>({n:r[0],amort:r[1],int:r[2],ass:r[3],ech:r[4],crd:r[5]}));
  }else{
    rows=[];
    const taux=pret.taux/100/12, mens=pret.mensualiteCapInteret;
    let crd=pret.montant;
    for(let i=1;i<=pret.dureeMois && crd>0.01;i++){
      const it=crd*taux;
      let cap=Math.min(Math.max(mens-it,0),crd);
      crd-=cap;
      rows.push({n:i,amort:cap,int:it,ass:(pret.mensualiteAvecAssurance||mens)-mens,ech:cap+it+((pret.mensualiteAvecAssurance||mens)-mens),crd});
    }
  }
  pret._schedCache=rows;
  return rows;
}

/** État du prêt à une période ym (fin de mois) */
function calcPretAtDate(pret, ym){
  const sched=pretSchedule(pret);
  const start=dateToYM(pret.dateDebutAmortissement||pret.premiereEcheance||pret.dateDepart);
  const k=Math.max(0, Math.min(sched.length, monthsBetween(start,ym)+1)); // nb échéances passées
  let capR=0, intR=pret.interetsIntercalaires||0, assR=0;
  for(let i=0;i<k;i++){ capR+=sched[i].amort; intR+=sched[i].int; assR+=sched[i].ass; }
  const cur=k>0?sched[k-1]:null;
  return {
    capitalRestant: k>0 ? sched[k-1].crd : pret.montant,
    capitalRembourseCumul: capR,
    interetsPayesCumul: intR,
    assuranceIncluseCumul: assR,
    mensCapitalMois: cur?cur.amort:0,
    mensInteretsMois: cur?cur.int:0,
    mensTotaleMois: (k>0 && k<=sched.length) ? cur.amort+cur.int : 0,
    moisEcoules: k,
    dureeTot: sched.length,
    actif: k>0 && k<sched.length
  };
}

/** Valorisation la plus récente <= ym */
function getValoAt(bien, ym, mode='manuelle'){
  const arr=bien.valorisation?.[mode]; if(!arr||!arr.length) return null;
  const cible=ymToDate(ym).getTime();
  const sorted=[...arr].sort((a,b)=>new Date(a.date)-new Date(b.date));
  let best=sorted[0];
  for(const v of sorted) if(new Date(v.date).getTime()<=cible+2678400000) best=v;
  return best;
}
function bienValeur(bien, ym){
  const man=getValoAt(bien,ym,'manuelle');
  const m2=getValoAt(bien,ym,'prixM2');
  const vMan=man?.valeur ?? bien.prixAchat ?? 0;
  const vM2=m2 ? m2.valeur*(bien.surface||0) : (bien.prixAchat??0);
  return {manuelle:vMan, m2:vM2, retenue:vMan};
}

/** Cotisations d'assurance externes (hors échéance) d'un bien pour un mois où le prêt est actif */
function bienAssurancesMois(bien){
  return (bien.assurances||[]).reduce((a,x)=>a+(x.cotMensuelle||0),0);
}

/** Flux d'un mois pour un bien (sorties, et loyers en entrée si LMNP loué) */
function calcFluxMois(bien, ym){
  const out={mensualites:0,assurances:0,charges:0,travaux:0,loyers:0,total:0,parP:{[P1().id]:0,[P2().id]:0}};
  if(bien.statut!=='detenu') return out;
  const add=(montant,pa,pv)=>{ out.parP[P1().id]+=montant*(pa/100); out.parP[P2().id]+=montant*(pv/100); };
  for(const pret of bien.prets||[]){
    const st=calcPretAtDate(pret,ym);
    if(st.mensTotaleMois>0){ out.mensualites+=st.mensTotaleMois; add(st.mensTotaleMois,pret.partArmand,pret.partVictoria); }
  }
  for(const ass of bien.assurances||[]){
    const pret=(bien.prets||[]).find(p=>p.id===ass.pretId);
    if(pret){ const st=calcPretAtDate(pret,ym); if(st.moisEcoules===0||st.moisEcoules>=st.dureeTot) continue; }
    out.assurances+=ass.cotMensuelle||0; add(ass.cotMensuelle||0, ass.partArmand??50, ass.partVictoria??50);
  }
  for(const c of bien.chargesRecurrentes||[]) if(dateToYM(c.date)===ym){
    out.charges+=c.montant; add(c.montant, c.partArmand??100, c.partVictoria??0);
  }
  for(const t of bien.travauxCompta||[]) if(dateToYM(t.date)===ym){
    out.travaux+=t.montant; add(t.montant, t.partArmand??bien.quoteParts.armand, t.partVictoria??bien.quoteParts.victoria);
  }
  if(bien.locatif){
    for(const l of bien.locatif.loyers||[]) if(dateToYM(l.date)===ym) out.loyers+=l.montant;
  }
  out.total=out.mensualites+out.assurances+out.charges+out.travaux;
  return out;
}

/** Cumuls depuis l'origine jusqu'à ym pour un bien */
function calcCumul(bien, ym){
  const r={capitalRembourse:0,interetsPayes:0,assurancesCumul:0,chargesCumul:0,travauxCumul:0,loyersCumul:0,
           capitalRestantTotal:0,fraisCredit:0,parP:{[P1().id]:0,[P2().id]:0}};
  if(bien.statut!=='detenu') return r;
  const endOfYm=new Date(ymToDate(ym).getFullYear(), ymToDate(ym).getMonth()+1, 0);
  const add=(m,pa,pv)=>{ r.parP[P1().id]+=m*(pa/100); r.parP[P2().id]+=m*(pv/100); };
  for(const pret of bien.prets||[]){
    const st=calcPretAtDate(pret,ym);
    r.capitalRembourse+=st.capitalRembourseCumul;
    r.interetsPayes+=st.interetsPayesCumul;
    r.capitalRestantTotal+=st.capitalRestant;
    r.fraisCredit+=(pret.fraisDossier||0)+(pret.caution||0);
    add(st.capitalRembourseCumul+st.interetsPayesCumul+(pret.interetsIntercalaires?0:0), pret.partArmand, pret.partVictoria);
  }
  for(const ass of bien.assurances||[]){
    const pret=(bien.prets||[]).find(p=>p.id===ass.pretId); if(!pret) continue;
    const st=calcPretAtDate(pret,ym);
    const tot=(ass.cotMensuelle||0)*st.moisEcoules;
    r.assurancesCumul+=tot; add(tot, ass.partArmand??50, ass.partVictoria??50);
  }
  for(const c of bien.chargesRecurrentes||[]) if(new Date(c.date)<=endOfYm){
    r.chargesCumul+=c.montant; add(c.montant, c.partArmand??100, c.partVictoria??0);
  }
  for(const t of bien.travauxCompta||[]) if(new Date(t.date)<=endOfYm){
    r.travauxCumul+=t.montant; add(t.montant, t.partArmand??bien.quoteParts.armand, t.partVictoria??bien.quoteParts.victoria);
  }
  if(bien.locatif) for(const l of bien.locatif.loyers||[]) if(new Date(l.date)<=endOfYm) r.loyersCumul+=l.montant;
  r.coutTotalPossession=r.capitalRembourse+r.interetsPayes+r.assurancesCumul+r.chargesCumul+r.travauxCumul;
  r.investiCumul=r.capitalRembourse+r.travauxCumul+r.chargesCumul;
  return r;
}

/** Patrimoine global à ym */
function calcGlobal(ym){
  const g={valeur:0,dette:0,net:0,parP:{[P1().id]:0,[P2().id]:0},parBien:[]};
  for(const bien of APP.state.biens){
    if(bien.statut!=='detenu'){ g.parBien.push({bien,valeur:0,net:0}); continue; }
    const v=bienValeur(bien,ym).retenue;
    const cum=calcCumul(bien,ym);
    g.valeur+=v; g.dette+=cum.capitalRestantTotal;
    let netP1=v*(bien.quoteParts.armand/100), netP2=v*(bien.quoteParts.victoria/100);
    for(const pret of bien.prets||[]){
      const st=calcPretAtDate(pret,ym);
      netP1-=st.capitalRestant*(pret.partArmand/100);
      netP2-=st.capitalRestant*(pret.partVictoria/100);
    }
    g.parP[P1().id]+=netP1; g.parP[P2().id]+=netP2;
    g.parBien.push({bien,valeur:v,net:v-cum.capitalRestantTotal});
  }
  g.net=g.valeur-g.dette;
  return g;
}

// ---------- LMNP ----------
function lmnpInvestTotal(bien){
  return (bien.prixAchat||0)+(bien.fraisNotaire||0)+(bien.fraisAutres||0)
    +(bien.travauxCompta||[]).reduce((a,t)=>a+Math.max(0,t.montant),0);
}
function lmnpChargesAnnuelles(bien){
  const ch=bien.locatif?.chargesAnnuelles||{};
  let tot=0;
  for(const [k,v] of Object.entries(ch)){
    if(k==='cfe' && (bien.locatif.loyerHC||0)*12<=5000) continue;
    tot+=v||0;
  }
  return tot;
}
function lmnpCashflow(bien){
  const loyer=bien.locatif?.loyerHC||0;
  let mens=0;
  for(const pret of bien.prets||[]) mens+=(pret.mensualiteAvecAssurance||pret.mensualiteCapInteret||0);
  const chM=lmnpChargesAnnuelles(bien)/12;
  return {loyer, mens, chargesMois:chM, cfMois:loyer-mens-chM, cfAn:(loyer-mens-chM)*12};
}
function lmnpAmortAnnuel(bien, annee=1){
  const a=bien.locatif?.amort||{};
  const bati=(a.bati&&a.durb)?a.bati/a.durb:0;
  const mob=(a.mob&&a.durm&&annee<=a.durm)?a.mob/a.durm:0;
  return {bati,mob,total:bati+mob};
}
/** Comparateur fiscal année pleine (approximation année 1) */
function lmnpFiscal(bien){
  const loyerAn=(bien.locatif?.loyerHC||0)*12;
  const charges=lmnpChargesAnnuelles(bien);
  let interetsAn=0;
  for(const pret of bien.prets||[]){
    const sched=pretSchedule(pret);
    interetsAn+=sched.slice(0,12).reduce((x,r)=>x+r.int,0);
    interetsAn+=sched.slice(0,12).reduce((x,r)=>x+r.ass,0);
  }
  const am=lmnpAmortAnnuel(bien,1);
  const baseMicro=loyerAn*0.5;
  const resReelAvantAm=loyerAn-charges-interetsAn;
  const amortUtilisable=Math.max(0,Math.min(am.total, resReelAvantAm)); // art. 39C : pas de déficit par amortissement
  const baseReel=Math.max(0, resReelAvantAm-amortUtilisable);
  const amortDiffere=am.total-amortUtilisable;
  return {loyerAn,charges,interetsAn,amort:am,baseMicro,baseReel,resReelAvantAm,amortDiffere,
          eco:(baseMicro-baseReel)};
}

// ---------- Projection patrimoine (par année) ----------
function projectionData(){
  const start=currentYM();
  const pts=[];
  let maxMonths=12;
  for(const b of APP.state.biens) for(const p of b.prets||[]){
    const st=calcPretAtDate(p,start);
    const sched=pretSchedule(p);
    const startYm=dateToYM(p.dateDebutAmortissement||p.premiereEcheance||p.dateDepart);
    const remaining=sched.length-monthsBetween(startYm,start);
    maxMonths=Math.max(maxMonths,remaining);
  }
  maxMonths=Math.min(maxMonths,360);
  for(let m=0;m<=maxMonths;m+=12){
    const ym=addMonths(start,m);
    let valeur=0,dette=0;
    for(const bien of APP.state.biens){
      if(bien.statut!=='detenu') continue;
      valeur+=bienValeur(bien,ym).retenue;
      for(const pret of bien.prets||[]) dette+=calcPretAtDate(pret,ym).capitalRestant;
    }
    pts.push({label:ymToDate(ym).getFullYear(),valeur,dette,net:valeur-dette});
  }
  return pts;
}

  for(const b of APP.state.biens) for(const p of b.prets||[]) delete p._schedCache;
}

async function acterSignature(bienId){
  const b=bienById(bienId); if(!b) return;
  genericModal(`

      <div><label class="fl">Prix d'achat définitif</label><input id="as_prix" type="number" step="0.01" value="${b.prixAchat??''}" style="width:100%"></div>
      <div><label class="fl">Frais de notaire réels</label><input id="as_notaire" type="number" step="0.01" value="${b.fraisNotaire??''}" style="width:100%"></div>
    </div>

      <button class="btn btn-p" onclick="confirmSignature('${b.id}')">🎉 C'est signé</button>
    </div>`);
}
function confirmSignature(bienId){
  const b=bienById(bienId);
  b.statut='detenu';
  b.dateAcquisition=document.getElementById('as_date').value;
  b.prixAchat=parseFloat(document.getElementById('as_prix').value)||b.prixAchat;
  b.fraisNotaire=parseFloat(document.getElementById('as_notaire').value)||b.fraisNotaire;
  if(!b.valorisation) b.valorisation={manuelle:[],prixM2:[]};
  if(!b.valorisation.manuelle.length) b.valorisation.manuelle.push({date:b.dateAcquisition,valeur:b.prixAchat,source:'Prix d\'achat'});
  saveLocal(); closeModal(); renderAll();
  toast('🎉 Félicitations pour l\'acquisition !');
}

function quickAddLine(kind){
  const biens=APP.state.biens.filter(b=>kind==='loyer'?b.locatif:true);

    </div>
    <div class="row" style="justify-content:flex-end">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-p" onclick="confirmQuickAdd('${kind}')">Ajouter</button>
    </div>`);
}
function confirmQuickAdd(kind){
  const b=bienById(document.getElementById('qa_bien').value);
  const date=document.getElementById('qa_date').value;
  const montant=parseFloat(document.getElementById('qa_montant').value)||0;
  const lib=document.getElementById('qa_lib').value;
  if(kind==='travaux'){ (b.travauxCompta=b.travauxCompta||[]).push({id:uid('c'),date,poste:lib||'Dépense',montant,partArmand:b.quoteParts.armand,partVictoria:b.quoteParts.victoria,categorie:'travaux',posteId:null}); }
  else if(kind==='charge'){ (b.chargesRecurrentes=b.chargesRecurrentes||[]).push({id:uid('ch'),date,type:'autre',libelle:lib,montant,partArmand:100,partVictoria:0}); }
  else if(kind==='loyer'){ b.locatif.loyers=b.locatif.loyers||[]; b.locatif.loyers.push({id:uid('l'),date,montant,note:lib}); }
  else if(kind==='valo'){ b.valorisation=b.valorisation||{manuelle:[],prixM2:[]}; b.valorisation.manuelle.push({date,valeur:montant,source:lib||'Estimation'}); }
  saveLocal(); closeModal(); renderAll(); toast('Ajouté ✓');
}

function showAmortTable(bienId,pretId){
  const bien=bienById(bienId), pret=bien.prets.find(p=>p.id===pretId);
  const sched=pretSchedule(pret);
  const startYm=dateToYM(pret.dateDebutAmortissement||pret.premiereEcheance||pret.dateDepart);
  const ymNow=APP.state.ui.period;
  const kNow=monthsBetween(startYm,ymNow)+1;
  let rows='';
  for(const r of sched){

    rows+=`<tr style="${r.n===kNow?'background:var(--teal-soft);font-weight:600':''}">
      <td class="num">${r.n}</td><td>${monthLabel(ym)}</td>

  genericModal(`

    <button class="btn btn-sm" onclick="closeModal()">✕</button></div>

async function savePret(bienId,pretId){
  const bien=bienById(bienId);
  const g=id=>document.getElementById(id).value;
  const isNew=!pretId;
  const pret=isNew?{id:uid('pret')}:bien.prets.find(p=>p.id===pretId);
  if(!isNew){
    const ok=await confirmModal({title:'Modifier ce prêt ?',body:'Impacte : capital remboursé, intérêts, mensualités, patrimoine net, répartition.'});
    if(!ok) return;
  }
  Object.assign(pret,{label:g('ep_label'),banque:g('ep_banque'),montant:+g('ep_montant'),taux:+g('ep_taux'),
    dureeMois:+g('ep_duree'),mensualiteCapInteret:+g('ep_mens'),mensualiteAvecAssurance:+g('ep_menst')||null,
    dateDepart:g('ep_dep'),premiereEcheance:g('ep_first'),dateDebutAmortissement:g('ep_amort'),
    interetsIntercalaires:+g('ep_inter')||0,fraisDossier:+g('ep_fd')||0,caution:+g('ep_caution')||0,
    partArmand:+g('ep_pa'),partVictoria:+g('ep_pv')});
  delete pret._schedCache;
  if(isNew) (bien.prets=bien.prets||[]).push(pret);
  saveLocal(); closeModal(); renderAll(); toast('Prêt enregistré ✓');
}
async function delPret(bienId,pretId){
  const ok=await confirmModal({title:'Supprimer ce prêt ?',body:'Les assurances liées resteront à réaffecter.'});
  if(!ok) return;
  const bien=bienById(bienId);
  bien.prets=bien.prets.filter(p=>p.id!==pretId);
  saveLocal(); closeModal(); renderAll();
}

function saveBien(bienId){
  const b=bienById(bienId);
  const g=id=>document.getElementById(id).value;
  const wasLMNP=b.type==='LMNP';
  Object.assign(b,{label:g('eb_label'),type:g('eb_type'),adresse:g('eb_adr'),surface:+g('eb_surf')||null,
    lot:g('eb_lot'),dpe:g('eb_dpe'),statut:g('eb_statut'),prixAchat:+g('eb_prix')||null,fraisNotaire:+g('eb_notaire')||0,
    dateAcquisition:g('eb_dacq')||b.dateAcquisition,dateSignaturePrevue:g('eb_dsig')||null,
    quoteParts:{armand:+g('eb_qpa'),victoria:+g('eb_qpv')}});
  if(b.type==='LMNP'&&!b.locatif) b.locatif=defaultLocatif();
  saveLocal(); closeModal(); renderAll(); toast('Fiche mise à jour ✓');
}
async function delBien(bienId){
  const b=bienById(bienId);
  const ok=await confirmModal({title:'Supprimer '+b.label+' ?',body:'<b>Toutes les données du bien</b> (prêts, travaux, charges, locatif) seront supprimées. Les documents du coffre resteront.',okLabel:'Supprimer définitivement'});
  if(!ok) return;
  APP.state.biens=APP.state.biens.filter(x=>x.id!==bienId);
  APP.state.ui.page='dashboard';
  saveLocal(); closeModal(); renderAll();
}
function defaultLocatif(){
  const y=new Date().getFullYear();
  const suivi={}; for(let i=0;i<4;i++) suivi[y+i]=Array(12).fill().map(()=>({s:'vacant',l:'',n:''}));
  return {loyerHC:0,chargesRecup:0,locataire:'',bailDebut:'',suivi,suiviYear:y,
    chargesAnnuelles:{tf:0,cp:0,pno:0,gli:0,cfe:0,ent:0},regime:'reel',
    amort:{bati:0,durb:30,mob:0,durm:7},revente:{prix:0,duree:10},loyers:[]};
}

const CAT_TRAVAUX={gros_oeuvre:'Gros œuvre',second_oeuvre:'Second œuvre',finition:'Finition',options:'Options',frais_annexes:'Frais annexes'};
const CAT_COMPTA={travaux:'Travaux',meubles:'Meubles',recettes:'Recette',autre:'Autre'};

function reelDuPoste(bien,posteId){
  return (bien.travauxCompta||[]).filter(c=>c.posteId===posteId).reduce((a,c)=>a+c.montant,0);
}

function renderBienTravaux(c,bien){
  const sub=APP.state.ui['trav_'+bien.id]||'previ';
  c.innerHTML=`
    <div class="tabs">
      <div class="tab ${sub==='previ'?'active':''}" onclick="setTravTab('${bien.id}','previ')">📋 Budget prévisionnel</div>
      <div class="tab ${sub==='compta'?'active':''}" onclick="setTravTab('${bien.id}','compta')">💰 Paiements réels</div>
      <div class="tab ${sub==='bilan'?'active':''}" onclick="setTravTab('${bien.id}','bilan')">📊 Bilan</div>
    </div>
    <div id="travContent"></div>`;
  const t=document.getElementById('travContent');
  if(sub==='previ') renderTravPrevi(t,bien);
  else if(sub==='compta') renderTravCompta(t,bien);
  else renderTravBilan(t,bien);
}
function setTravTab(bienId,tab){ APP.state.ui['trav_'+bienId]=tab; localStorage.setItem(APP.LS_KEY,JSON.stringify(APP.state)); renderAll(); }

function renderTravPrevi(t,bien){
  let rows='',totHT=0,totTTC=0,totReel=0;
  for(const p of bien.travauxPrevi||[]){
    const reel=reelDuPoste(bien,p.id);
    const ecart=p.prixTTC-reel;
    totHT+=p.prixHT; totTTC+=p.prixTTC; totReel+=reel;
    rows+=`<tr>
      <td><input value="${esc(p.poste)}" onchange="updPrevi('${bien.id}','${p.id}','poste',this.value)"></td>
      <td><input value="${esc(p.intervenant||'')}" onchange="updPrevi('${bien.id}','${p.id}','intervenant',this.value)"></td>
      <td><select onchange="updPrevi('${bien.id}','${p.id}','categorie',this.value)">${Object.entries(CAT_TRAVAUX).map(([k,v])=>`<option value="${k}" ${p.categorie===k?'selected':''}>${v}</option>`).join('')}</select></td>
      <td class="tr-right"><input type="number" step="0.01" value="${p.prixHT}" style="text-align:right" onchange="updPrevi('${bien.id}','${p.id}','prixHT',parseFloat(this.value))"></td>
      <td class="tr-right"><input type="number" step="0.01" value="${p.prixTTC}" style="text-align:right" onchange="updPrevi('${bien.id}','${p.id}','prixTTC',parseFloat(this.value))"></td>
      <td class="tr-right num" style="font-weight:600">${fmtEUR(reel,2)}</td>
      <td class="tr-right num" style="font-weight:700;color:${ecart>=0?'var(--green)':'var(--red)'}">${fmtEUR(ecart,0)}</td>
      <td><button class="btn btn-icon btn-danger" onclick="delPrevi('${bien.id}','${p.id}')">🗑️</button></td></tr>`;
  }
  t.innerHTML=`
    <div class="spread mb"><div class="sec-title" style="margin:0">📋 Postes prévisionnels</div>
    <button class="btn btn-sm" onclick="addPrevi('${bien.id}')">＋ Poste</button></div>
    <div class="card scroll-wrap"><table class="tbl">
    <thead><tr><th>Poste</th><th>Intervenant</th><th>Catégorie</th><th class="tr-right">HT</th><th class="tr-right">TTC</th><th class="tr-right">Payé réel <span class="tt"><span class="tt-i">i</span><span class="tt-c">Somme des lignes de paiements réels rattachées à ce poste (colonne "Poste budget" de l'onglet Paiements réels).</span></span></th><th class="tr-right">Écart</th><th></th></tr></thead>
    <tbody>${rows||'<tr><td colspan="8" class="empty">Aucun poste budgété</td></tr>'}</tbody>
    <tfoot><tr><td colspan="3" class="tr-right">TOTAUX</td><td class="tr-right num">${fmtEUR(totHT)}</td><td class="tr-right num">${fmtEUR(totTTC)}</td><td class="tr-right num">${fmtEUR(totReel)}</td><td class="tr-right num" style="color:${totTTC-totReel>=0?'var(--green)':'var(--red)'}">${fmtEUR(totTTC-totReel)}</td><td></td></tr></tfoot>
    </table></div>
    <p style="font-size:11.5px;color:var(--muted)">💡 Le "payé réel" se calcule via le rattachement manuel des lignes de paiement à un poste (fini le rapprochement approximatif par mots-clés).</p>`;
}
function updPrevi(bienId,id,f,v){ const b=bienById(bienId); const p=b.travauxPrevi.find(x=>x.id===id); if(p){p[f]=v;saveLocal();renderAll();} }
function addPrevi(bienId){ const b=bienById(bienId); (b.travauxPrevi=b.travauxPrevi||[]).push({id:uid('p'),poste:'Nouveau poste',intervenant:'',prixHT:0,prixTTC:0,categorie:'finition'}); saveLocal(); renderAll(); }
async function delPrevi(bienId,id){
  if(!await confirmModal({title:'Supprimer ce poste ?',body:'Les paiements réels rattachés ne seront pas supprimés.'})) return;
  const b=bienById(bienId); b.travauxPrevi=b.travauxPrevi.filter(p=>p.id!==id); saveLocal(); renderAll();
}

function renderTravCompta(t,bien){
  const search=(APP._travSearch||'').toLowerCase();
  const list=(bien.travauxCompta||[]).filter(c=>!search||c.poste.toLowerCase().includes(search)).sort((a,b)=>new Date(a.date)-new Date(b.date));
  let rows='',tot=0,tA=0,tV=0;
  const posteOpts=p=>`<option value="">— libre —</option>`+(bien.travauxPrevi||[]).map(x=>`<option value="${x.id}" ${p===x.id?'selected':''}>${esc(x.poste.slice(0,28))}</option>`).join('');
  for(const cl of list){
    const pa=cl.partArmand??bien.quoteParts.armand, pv=cl.partVictoria??bien.quoteParts.victoria;
    const vA=cl.montant*pa/100, vV=cl.montant*pv/100;
    tot+=cl.montant; tA+=vA; tV+=vV;
    rows+=`<tr>
      <td><input type="date" value="${cl.date}" onchange="updCompta('${bien.id}','${cl.id}','date',this.value)"></td>
      <td><input value="${esc(cl.poste)}" onchange="updCompta('${bien.id}','${cl.id}','poste',this.value)"></td>
      <td><select onchange="updCompta('${bien.id}','${cl.id}','categorie',this.value)">${Object.entries(CAT_COMPTA).map(([k,v])=>`<option value="${k}" ${cl.categorie===k?'selected':''}>${v}</option>`).join('')}</select></td>
      <td><select onchange="updCompta('${bien.id}','${cl.id}','posteId',this.value||null)">${posteOpts(cl.posteId)}</select></td>
      <td class="tr-right"><input type="number" step="0.01" value="${cl.montant}" style="text-align:right" onchange="updCompta('${bien.id}','${cl.id}','montant',parseFloat(this.value))"></td>
      <td class="tr-right num" style="color:${P1().couleur}">${fmtEUR(vA,2)}</td>
      <td class="tr-right num" style="color:${P2().couleur}">${fmtEUR(vV,2)}</td>
      <td><div class="row" style="gap:3px;flex-wrap:nowrap"><input type="number" min="0" max="100" value="${pa}" style="width:48px;text-align:center" onchange="updComptaPart('${bien.id}','${cl.id}',parseFloat(this.value))">/<span class="num" style="font-size:11px">${pv}</span></div></td>
      <td><button class="btn btn-icon btn-danger" onclick="delCompta('${bien.id}','${cl.id}')">🗑️</button></td></tr>`;
  }
  t.innerHTML=`
    <div class="spread mb">
      <div class="sec-title" style="margin:0">💰 Paiements réels <span class="badge b-grey">${list.length} lignes</span></div>
      <div class="row">
        <input placeholder="🔎 Rechercher…" value="${esc(APP._travSearch||'')}" oninput="APP._travSearch=this.value;renderAll()" style="width:160px">
        <button class="btn btn-sm btn-p" onclick="addCompta('${bien.id}')">＋ Ligne</button>
      </div>
    </div>
    <div class="card scroll-wrap" style="max-height:60vh;overflow-y:auto"><table class="tbl">
    <thead><tr><th>Date</th><th>Libellé</th><th>Cat.</th><th>Poste budget</th><th class="tr-right">Montant</th><th class="tr-right">${esc(P1().nom.split(' ')[0])}</th><th class="tr-right">${esc(P2().nom.split(' ')[0])}</th><th>% ${esc(P1().nom[0])}/${esc(P2().nom[0])}</th><th></th></tr></thead>
    <tbody>${rows||'<tr><td colspan="9" class="empty">Aucun paiement</td></tr>'}</tbody>
    <tfoot><tr><td colspan="4" class="tr-right">TOTAUX</td><td class="tr-right num">${fmtEUR(tot,2)}</td><td class="tr-right num">${fmtEUR(tA,2)}</td><td class="tr-right num">${fmtEUR(tV,2)}</td><td colspan="2"></td></tr></tfoot>
    </table></div>
    <p style="font-size:11.5px;color:var(--muted)">💡 Répartition par défaut <b>${bien.quoteParts.armand}/${bien.quoteParts.victoria}</b>, modifiable ligne par ligne. Montants négatifs = recettes/remboursements.</p>`;
}
function updCompta(bienId,id,f,v){ const b=bienById(bienId); const cl=b.travauxCompta.find(x=>x.id===id); if(cl){cl[f]=v;saveLocal();renderAll();} }
function updComptaPart(bienId,id,v){ const b=bienById(bienId); const cl=b.travauxCompta.find(x=>x.id===id); if(cl){cl.partArmand=v;cl.partVictoria=100-v;saveLocal();renderAll();} }
function addCompta(bienId){ const b=bienById(bienId); (b.travauxCompta=b.travauxCompta||[]).push({id:uid('c'),date:new Date().toISOString().slice(0,10),poste:'Nouvelle dépense',montant:0,partArmand:b.quoteParts.armand,partVictoria:b.quoteParts.victoria,categorie:'travaux',posteId:null}); saveLocal(); renderAll(); }
async function delCompta(bienId,id){
  if(!await confirmModal({title:'Supprimer cette ligne ?',body:'Les cumuls seront recalculés.'})) return;
  const b=bienById(bienId); b.travauxCompta=b.travauxCompta.filter(c=>c.id!==id); saveLocal(); renderAll();
}

function renderTravBilan(t,bien){
  const previ=bien.travauxPrevi||[], compta=bien.travauxCompta||[];
  const totBudget=previ.reduce((a,p)=>a+p.prixTTC,0);
  const totReel=compta.reduce((a,c)=>a+c.montant,0);
  const totMeubles=compta.filter(c=>c.categorie==='meubles').reduce((a,c)=>a+c.montant,0);
  const totRecettes=compta.filter(c=>c.montant<0).reduce((a,c)=>a+c.montant,0);
  // Ventilation par catégorie : budget vs réel rattaché
  const cats={};
  for(const [k,label] of Object.entries(CAT_TRAVAUX)) cats[k]={label,budget:0,reel:0};
  for(const p of previ){ if(cats[p.categorie]) {cats[p.categorie].budget+=p.prixTTC; cats[p.categorie].reel+=reelDuPoste(bien,p.id);} }
  const reelNonRattache=compta.filter(c=>!c.posteId&&c.categorie==='travaux').reduce((a,c)=>a+c.montant,0);
  const coutAcq=(bien.prixAchat||0)+(bien.fraisNotaire||0);
  const coutProjet=coutAcq+totReel;
  const plafond=bien.plafondProjet||0;

  t.innerHTML=`
    <div class="grid g4 mb">
      <div class="card card-p"><div class="kpi-label">Budget total TTC</div><div class="kpi-value num" style="font-size:20px">${fmtEUR(totBudget)}</div></div>
      <div class="card card-p"><div class="kpi-label">Payé réel (net)</div><div class="kpi-value num" style="font-size:20px;color:var(--amber)">${fmtEUR(totReel)}</div><div class="kpi-sub">dont recettes ${fmtEUR(totRecettes)}</div></div>
      <div class="card card-p"><div class="kpi-label">Meubles & déco</div><div class="kpi-value num" style="font-size:20px;color:var(--blue)">${fmtEUR(totMeubles)}</div></div>
      <div class="card card-p"><div class="kpi-label">Reste vs budget</div><div class="kpi-value num" style="font-size:20px;color:${totBudget-totReel>=0?'var(--green)':'var(--red)'}">${fmtEUR(totBudget-totReel)}</div></div>
    </div>
    ${plafond?`<div class="card card-p mb">
      <div class="sec-title">🎯 Coût projet vs plafond</div>
      <table class="tbl">
        <tr><td>Acquisition (prix + notaire)</td><td class="tr-right num">${fmtEUR(coutAcq)}</td></tr>
        <tr><td>Travaux + meubles réels</td><td class="tr-right num">${fmtEUR(totReel)}</td></tr>
        <tr><td style="font-weight:700">Coût projet total</td><td class="tr-right num" style="font-weight:800">${fmtEUR(coutProjet)}</td></tr>
        <tr><td style="color:var(--muted)">Plafond fixé</td><td class="tr-right num">${fmtEUR(plafond)}</td></tr>
      </table>
      <div class="pbar mt"><div class="pfill ${coutProjet>plafond?'red':coutProjet>plafond*0.95?'amber':''}" style="width:${Math.min(100,coutProjet/plafond*100)}%"></div></div>
      <div style="font-size:11.5px;margin-top:5px;${coutProjet>plafond?'color:var(--red);font-weight:700':'color:var(--muted)'}">${fmtPct(coutProjet/plafond*100,1)} du plafond ${coutProjet>plafond?'— DÉPASSEMENT '+fmtEUR(coutProjet-plafond):''}</div>
    </div>`:''}
    <div class="grid g2">
      <div class="card card-p">
        <div class="sec-title">📊 Budget vs réel par catégorie</div>
        <div class="chart-box" style="height:230px"><canvas id="chCat"></canvas></div>
        ${reelNonRattache?`<p style="font-size:11px;color:var(--amber);margin:8px 0 0">⚠️ ${fmtEUR(reelNonRattache)} de paiements "travaux" non rattachés à un poste budget.</p>`:''}
      </div>
      <div class="card card-p">
        <div class="sec-title">🧾 Détail par catégorie</div>
        <table class="tbl"><thead><tr><th>Catégorie</th><th class="tr-right">Budget</th><th class="tr-right">Réel rattaché</th><th class="tr-right">Écart</th></tr></thead><tbody>
        ${Object.values(cats).map(x=>`<tr><td style="font-weight:600">${x.label}</td><td class="tr-right num">${fmtEUR(x.budget)}</td><td class="tr-right num">${fmtEUR(x.reel)}</td><td class="tr-right num" style="color:${x.budget-x.reel>=0?'var(--green)':'var(--red)'}">${fmtEUR(x.budget-x.reel)}</td></tr>`).join('')}
        </tbody></table>
      </div>
    </div>`;

  if(CHART_OK()){
    APP.charts.cat=new Chart(document.getElementById('chCat'),{type:'bar',
      data:{labels:Object.values(cats).map(x=>x.label),datasets:[
        {label:'Budget TTC',data:Object.values(cats).map(x=>x.budget),backgroundColor:'rgba(47,93,138,.55)',borderRadius:5},
        {label:'Réel rattaché',data:Object.values(cats).map(x=>x.reel),backgroundColor:'rgba(29,77,59,.75)',borderRadius:5}]},
      options:{...chartBase,scales:{y:{ticks:{callback:eurTick,font:{size:10}}},x:{ticks:{font:{size:10}}}}}});
  }
}

const TYPE_CHARGES={taxe_fonciere:['🏛️','Taxe foncière'],copro:['🏢','Copropriété'],electricite:['⚡','Électricité'],eau:['💧','Eau'],internet:['📡','Internet'],gaz:['🔥','Gaz'],assurance_habitation:['🛡️','Assurance hab.'],autre:['📌','Autre']};
function renderBienCharges(c,bien){
  const charges=bien.chargesRecurrentes||[];
  const byType={};
  for(const ch of charges){ byType[ch.type]=byType[ch.type]||{total:0,count:0,last:null}; byType[ch.type].total+=ch.montant; byType[ch.type].count++;
    if(!byType[ch.type].last||new Date(ch.date)>new Date(byType[ch.type].last)) byType[ch.type].last=ch.date; }
  const y=new Date().getFullYear();
  const totalAnnee=charges.filter(ch=>new Date(ch.date).getFullYear()===y).reduce((a,ch)=>a+ch.montant,0);
  let rows='';
  for(const ch of [...charges].sort((a,b)=>new Date(b.date)-new Date(a.date))){
    rows+=`<tr>
      <td><input type="date" value="${ch.date}" onchange="updCharge('${bien.id}','${ch.id}','date',this.value)"></td>
      <td><select onchange="updCharge('${bien.id}','${ch.id}','type',this.value)">${Object.entries(TYPE_CHARGES).map(([k,v])=>`<option value="${k}" ${ch.type===k?'selected':''}>${v[0]} ${v[1]}</option>`).join('')}</select></td>
      <td><input value="${esc(ch.libelle||'')}" placeholder="ex : facture février" onchange="updCharge('${bien.id}','${ch.id}','libelle',this.value)"></td>
      <td class="tr-right"><input type="number" step="0.01" value="${ch.montant}" style="text-align:right" onchange="updCharge('${bien.id}','${ch.id}','montant',parseFloat(this.value))"></td>
      <td><div class="row" style="gap:3px;flex-wrap:nowrap"><input type="number" min="0" max="100" value="${ch.partArmand??100}" style="width:48px;text-align:center" onchange="updChargePart('${bien.id}','${ch.id}',parseFloat(this.value))">/<span class="num" style="font-size:11px">${ch.partVictoria??0}</span></div></td>
      <td><button class="btn btn-icon btn-danger" onclick="delCharge('${bien.id}','${ch.id}')">🗑️</button></td></tr>`;
  }
  c.innerHTML=`

function addValo(bienId,mode){

function updValo(bienId,mode,i,f,v){

async function delValo(bienId,mode,i){

          <div><label class="fl">Charges récup. €/mois</label><input type="number" value="${L.chargesRecup||0}" onchange="updLocatif('${bien.id}','chargesRecup',parseFloat(this.value))" style="width:100%"></div>
          <div><label class="fl">Locataire</label><input value="${esc(L.locataire||'')}" onchange="updLocatif('${bien.id}','locataire',this.value)" style="width:100%"></div>

function updLocatif(bienId,f,v){ const b=bienById(bienId); b.locatif[f]=v; saveLocal(); renderAll(); }
function updLocatifCharge(bienId,k,v){ const b=bienById(bienId); b.locatif.chargesAnnuelles[k]=v||0; saveLocal(); renderAll(); }
function setSuiviYear(bienId,y){ const b=bienById(bienId); b.locatif.suiviYear=y; saveLocal(); renderAll(); }
function cycleOcc(bienId,y,i){
  const b=bienById(bienId); const cell=b.locatif.suivi[y][i];
  cell.s=OCC_CYCLE[(OCC_CYCLE.indexOf(cell.s)+1)%OCC_CYCLE.length];
  if(cell.s==='loue'&&!cell.l) cell.l=String(b.locatif.loyerHC||'');
  saveLocal(); renderAll();
}
function delLoyer(bienId,id){ const b=bienById(bienId); b.locatif.loyers=b.locatif.loyers.filter(l=>l.id!==id); saveLocal(); renderAll(); }
function simLoyer(bienId,val,init){
  const b=bienById(bienId); const L=b.locatif;
  const loyer=parseFloat(val);
  let mens=0; for(const p of b.prets||[]) mens+=(p.mensualiteAvecAssurance||p.mensualiteCapInteret||0);
  let ch=0; for(const [k,v] of Object.entries(L.chargesAnnuelles)){ if(k==='cfe'&&loyer*12<=5000) continue; ch+=v||0; }
  const cfm=loyer-mens-ch/12;
  const el=document.getElementById('simOut');
  if(el) el.innerHTML=`
    <div class="spread"><span style="font-size:13px">Loyer simulé : <b class="num">${fmtEUR(loyer,0)}/mois</b> ${loyer*12>5000?'<span class="badge b-amber">CFE due</span>':'<span class="badge b-green">pas de CFE</span>'}</span>
    <span class="num" style="font-size:17px;font-weight:800;color:${cfm>=0?'var(--green)':'var(--red)'}">${cfm>=0?'+':''}${fmtEUR(cfm,0)}/mois</span></div>
    <div style="font-size:11.5px;color:var(--muted);margin-top:4px">= ${fmtEUR(loyer,0)} − crédit ${fmtEUR(mens,0)} − charges ${fmtEUR(ch/12,0)} · soit ${fmtEUR(cfm*12,0)}/an</div>
    ${!init&&loyer!==L.loyerHC?`<button class="btn btn-sm mt" onclick="updLocatif('${bienId}','loyerHC',${loyer})">Adopter ce loyer</button>`:''}`;
}

function updAmort(bienId,k,v){ const b=bienById(bienId); b.locatif.amort[k]=v||0; saveLocal(); renderAll(); }
function updRevente(bienId,k,v){ const b=bienById(bienId); (b.locatif.revente=b.locatif.revente||{}).prix=b.locatif.revente.prix; b.locatif.revente[k]=v||0; saveLocal(); renderAll(); }
function reventeHtml(bien){
  const L=bien.locatif;
  const prix=L.revente?.prix||0, duree=L.revente?.duree||10;
  const achat=(bien.prixAchat||0)+(bien.fraisNotaire||0);
  const pv=prix-achat;
  const amortReintegres=Math.min(lmnpAmortAnnuel(bien,1).total*Math.min(duree,L.amort.durb||30), (L.amort.bati||0)+(L.amort.mob||0));
  const pvFiscale=pv+((duree>0&&prix>0)?amortReintegres:0);
  // abattements durée détention (IR : 6% /an de 6 à 21, 4% an 22 · PS : 1,65 % 6-21, 1,60 % 22, 9 % 23-30)
  let abIR=0; for(let a=6;a<=Math.min(duree,21);a++) abIR+=6; if(duree>=22) abIR+=4; abIR=Math.min(100,abIR);
  let abPS=0; for(let a=6;a<=Math.min(duree,21);a++) abPS+=1.65; if(duree>=22) abPS+=1.6; for(let a=23;a<=Math.min(duree,30);a++) abPS+=9; abPS=Math.min(100,abPS);
  const impIR=Math.max(0,pvFiscale*(1-abIR/100))*0.19;
  const impPS=Math.max(0,pvFiscale*(1-abPS/100))*0.172;
  let crd=0; for(const p of bien.prets||[]){ const sched=pretSchedule(p); const k=Math.min(sched.length,duree*12); crd=k<sched.length?sched[k-1]?.crd??0:0; }
  const netVendeur=prix-impIR-impPS-crd;
  if(!prix) return '<div class="empty">Renseigne un prix de revente pour simuler</div>';
  return `<table class="tbl">
    <tr><td>Plus-value brute</td><td class="tr-right num" style="font-weight:600">${fmtEUR(pv,0)}</td></tr>
    <tr><td>+ Amortissements réintégrés (LF 2025, estim.)</td><td class="tr-right num">${fmtEUR(amortReintegres,0)}</td></tr>
    <tr><td>Abattement durée (IR ${abIR} % · PS ${abPS.toFixed(1)} %)</td><td class="tr-right num">après ${duree} ans</td></tr>
    <tr><td>Impôt PV estimé (19 % + 17,2 %)</td><td class="tr-right num" style="color:var(--red)">${fmtEUR(impIR+impPS,0)}</td></tr>
    <tr><td>CRD restant à solder</td><td class="tr-right num">${fmtEUR(crd,0)}</td></tr>
    <tr><td style="font-weight:700">Net vendeur estimé</td><td class="tr-right num" style="font-weight:800;color:var(--teal)">${fmtEUR(netVendeur,0)}</td></tr>
  </table>
  <p style="font-size:10.5px;color:var(--muted);margin:6px 0 0">Ordre de grandeur indicatif — la fiscalité des plus-values LMNP a évolué (LF 2025) : à valider avec un professionnel avant décision.</p>`;
}

const AGENDA_TYPES={fiscal:['📊','b-red','Fiscal'],copro:['🏢','b-blue','Copro'],credit:['💳','b-amber','Crédit'],assurance:['🛡️','b-violet','Assurance'],perso:['📌','b-grey','Autre'],acte:['✍️','b-teal','Acte']};
function agendaAVenir(days){

  return (APP.state.agenda||[]).filter(a=>!a.done&&new Date(a.date)<=max).sort((a,b)=>new Date(a.date)-new Date(b.date));
}
function agendaItemHtml(a){

async function doPull(){
  const remote=await ghPull();

  const ok=await confirmModal({title:'Charger les données GitHub ?',

  const sync=APP.state.sync;

  localStorage.setItem(APP.LS_KEY,JSON.stringify(APP.state));
  APP.dirty=false;
  renderAll(); toast('Données GitHub chargées ✓');

async function addDocB64(d, have){
  if(have.has(d.filename+'|'+d.size)) return false;
  const bin=atob(d.dataB64); const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  await dbAddDoc({bienId:d.bienId,categorieId:d.categorieId,filename:d.filename,mimeType:d.mimeType,size:d.size,data:bytes.buffer,uploadedAt:d.uploadedAt||new Date().toISOString()});
  have.add(d.filename+'|'+d.size);
  return true;
}
async function loadDocsFromRepo(){
  if(!ghConfigured()){ toast('Configure d\'abord la sync GitHub','error'); return; }
  toast('Recherche des documents dans le repo…');
  try{
    const branch=APP.state.sync.branch||'main';
    const base='https://api.github.com/repos/'+APP.state.sync.repo+'/contents/docs-import';
    const r=await fetch(base+'?ref='+branch,{headers:ghHeaders()});
    if(r.status===404){ toast('Pas de dossier docs-import/ dans le repo','error'); return; }
    if(!r.ok) throw new Error('GitHub '+r.status);
    const list=(await r.json()).filter(x=>x.name.endsWith('.json')).sort((a,b)=>a.name.localeCompare(b.name));
    const have=new Set((await dbGetAllDocs()).map(d=>d.filename+'|'+d.size));
    let added=0; const parts={};
    for(let i=0;i<list.length;i++){
      toast('Téléchargement '+(i+1)+'/'+list.length+'…');
      const rr=await fetch(base+'/'+encodeURIComponent(list[i].name)+'?ref='+branch,{headers:{...ghHeaders(),'Accept':'application/vnd.github.raw'}});
      if(!rr.ok) throw new Error(list[i].name+' : '+rr.status);
      const payload=JSON.parse(await rr.text());
      for(const d of payload.documents||[]){
        if(d.parts&&d.parts>1){
          const k=d.filename;
          parts[k]=parts[k]||{meta:d,buf:new Array(d.parts).fill(null)};
          parts[k].buf[d.part-1]=d.dataB64;
          if(parts[k].buf.every(x=>x!==null)){
            if(await addDocB64({...parts[k].meta,dataB64:parts[k].buf.join('')},have)) added++;
            delete parts[k];
          }
        }else if(await addDocB64(d,have)) added++;
      }
    }
    toast(added+' document(s) ajoutés au coffre ✓');
    renderAll();
  }catch(e){ console.error(e); toast('Erreur : '+e.message,'error'); }
}

<p><b>🎯 À quoi ça sert.</b> Le coffre du bien : actes, offres de prêt, diagnostics, PV d'AG… classés par catégorie, consultables en 1 clic (👁️).</p>
<p><b>⚙️ Où sont-ils stockés ?</b> Dans le navigateur de CHAQUE appareil (pas dans la synchro, pour ne pas l'alourdir). Une archive complète existe dans votre repo GitHub privé : sur un nouvel appareil (ou pour Victoria), Réglages → <b>« 📥 Charger les documents du repo »</b> et tout arrive.</p>
<p><b>✍️ Ajouter un document :</b> bouton 📤 (il restera local — dis-le à Claude pour l'archiver aussi sur GitHub). Les originaux restent sur OneDrive : le coffre est un classeur de consultation.</p>`}
};
function showTabHelp(bienId){
  const tab=APP.state.ui['tab_'+bienId]||'ov';
  const bien=bienById(bienId);
  const hlp=HELP[tab]||HELP.ov;
  genericModal(`<div class="spread mb"><h3 style="font-size:16px">❓ ${hlp.t} — ${esc(bien.label)}</h3>
    <button class="btn btn-sm" onclick="closeModal()">✕</button></div>
    <div style="font-size:13px;line-height:1.65;color:var(--txt)">${hlp.b}</div>`);
}

// =====================================================================
// PROPOSITION AUTO DES DOCUMENTS (nouveau navigateur / Victoria)
// =====================================================================
async function offerDocsIfEmpty(){
  try{
    if(!ghConfigured()) return;
    if((await dbGetAllDocs()).length) return;
    const r=await fetch('https://api.github.com/repos/'+APP.state.sync.repo+'/contents/docs-import?ref='+(APP.state.sync.branch||'main'),{headers:ghHeaders()});
    if(!r.ok) return;
    if(!(await r.json()).some(x=>x.name.endsWith('.json'))) return;
    const ok=await confirmModal({title:'📥 Vos documents sont disponibles',
      body:'Le coffre de ce navigateur est vide, mais tous vos documents (actes, prêts, diagnostics…) sont archivés dans votre repo GitHub privé.<br><br>Les charger maintenant ? (~1 minute)',
      okLabel:'Charger les documents'});
    if(ok) loadDocsFromRepo();
  }catch(e){ console.warn(e); }
}

// =====================================================================
// INIT
// =====================================================================
document.addEventListener('DOMContentLoaded', async ()=>{
  await openDB();
  loadLocal();
  // Tentative de chargement d'un data.json posé à côté du fichier (marche en http/https, pas en file://)
  if(!APP.state.biens.length && location.protocol.startsWith('http')){
    try{
      const r=await fetch('data.json',{cache:'no-store'});
      if(r.ok){ const j=await r.json(); if(j.biens){ APP.state=migrate(j); saveLocal(); toast('data.json local chargé ✓'); } }
    }catch(e){}
  }
  renderAll();
  ghSyncOnLoad().then(()=>offerDocsIfEmpty());
});
</script>
</html>
